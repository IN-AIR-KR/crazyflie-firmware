<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Mesh Network Viz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #ddd; display: flex; height: 100vh; }

    #graph-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
    #graph-header { display: flex; align-items: center; gap: 16px; padding: 6px 12px; background: #1a1a1a; flex-shrink: 0; }
    #graph-header h2 { font-size: 13px; color: #888; }
    #range-controls { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; margin-left: auto; }
    #range-controls label { color: #555; }
    #range-slider { width: 100px; accent-color: #4af; cursor: pointer; }
    #range-input { width: 44px; background: #222; border: 1px solid #444; color: #aaa; font-size: 11px; font-family: monospace; text-align: right; padding: 1px 4px; border-radius: 2px; }
    #graph { flex: 1; position: relative; overflow: hidden; }
    #grid-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    #coord-panel { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.55); border: 1px solid #2a2a2a; border-radius: 3px; padding: 5px 8px; font-size: 10px; color: #555; pointer-events: none; z-index: 15; line-height: 1.8; min-width: 130px; }

    #log-panel { width: 420px; display: flex; flex-direction: column; }
    #log-header { display: flex; align-items: center; padding: 8px 12px; background: #1a1a1a; gap: 10px; }
    #log-header h2 { font-size: 13px; color: #888; flex: 1; }
    #log-header label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; cursor: pointer; white-space: nowrap; }
    #log-header input[type=checkbox] { accent-color: #2a9a4a; cursor: pointer; }
    #log-list { flex: 1; overflow-y: auto; padding: 6px; }
    .log-item { font-size: 11px; padding: 4px 6px; margin-bottom: 3px; background: #1a1a1a; border-left: 3px solid #333; border-radius: 2px; }
    .log-item.new { animation: row-flash 0.6s ease-out; }
    #status { padding: 6px 12px; font-size: 11px; color: #555; background: #1a1a1a; border-top: 1px solid #222; }

    /* 노드 */
    .node {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid #333; background: #111;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform: translate(-50%, -50%);
      font-size: 11px; font-weight: bold; color: #444;
      transition: border-color 0.3s, color 0.3s, left 0.25s, top 0.25s;
      z-index: 10;
    }
    .node.active   { border-color: #4af; color: #4af; }
    .node .seq     { font-size: 9px; font-weight: normal; color: #556; margin-top: 1px; }
    .node .pos     { font-size: 9px; font-weight: normal; color: #447; margin-top: 1px; }
    .node.gs       { border-color: #2a8; color: #2a8; background: #0d2a1a; }
    .node.gs.active { border-color: #4fb; color: #4fb; }
    .node.gs-flash { animation: gs-pulse 0.4s ease-out; }

    /* task 마커 */
    .task-marker {
      position: absolute; width: 20px; height: 20px;
      transform: translate(-50%, -50%) rotate(45deg);
      border: 2px solid #f80; background: rgba(255,140,0,0.12);
      z-index: 5; pointer-events: none;
      transition: left 0.25s, top 0.25s;
    }
    .task-label {
      position: absolute; transform: translate(-50%, -50%);
      font-size: 10px; color: #f80; font-family: monospace;
      z-index: 6; pointer-events: none;
      transition: left 0.25s, top 0.25s;
    }

    /* 통신 범위 원 */
    .range-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(100, 180, 255, 0.25);
      background: rgba(80, 140, 255, 0.04);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: left 0.25s, top 0.25s, width 0.2s, height 0.2s;
      z-index: 0;
    }
    .range-circle.gs {
      border-color: rgba(50, 200, 130, 0.3);
      background: rgba(50, 200, 130, 0.04);
    }

    /* 엣지 공통 */
    .edge { position: absolute; transform-origin: 0 50%; height: 18px; pointer-events: none; z-index: 1; }
    .edge-line { position: absolute; left: 0; right: 0; top: 50%; height: 2px; margin-top: -1px; background: #1e4a6a; transition: background 0.3s; }
    .edge-line::after { content: ''; position: absolute; right: -1px; top: -4px; width: 0; height: 0; border-left: 8px solid #1e4a6a; border-top: 5px solid transparent; border-bottom: 5px solid transparent; transition: border-left-color 0.3s; }

    /* 수신 엣지 (드론→GS드론) 파랑 */
    .edge.active .edge-line        { background: #2a7aaa; }
    .edge.active .edge-line::after { border-left-color: #2a7aaa; }
    .edge.flash .edge-line         { animation: line-flash 0.5s ease-out; }
    .edge.flash .edge-line::after  { animation: arrow-flash 0.5s ease-out; }
    @keyframes line-flash  { 0% { background: #7df; box-shadow: 0 0 8px #7df; } 100% { background: #2a7aaa; box-shadow: none; } }
    @keyframes arrow-flash { 0% { border-left-color: #7df; } 100% { border-left-color: #2a7aaa; } }

    /* 송신 엣지 (GS드론→드론) 초록 */
    .edge.out .edge-line        { background: #1a5a2a; }
    .edge.out .edge-line::after { border-left-color: #1a5a2a; }
    .edge.out.active .edge-line        { background: #2a9a4a; }
    .edge.out.active .edge-line::after { border-left-color: #2a9a4a; }
    .edge.out.flash .edge-line         { animation: line-flash-out 0.5s ease-out; }
    .edge.out.flash .edge-line::after  { animation: arrow-flash-out 0.5s ease-out; }
    @keyframes line-flash-out  { 0% { background: #7fb; box-shadow: 0 0 8px #7fb; } 100% { background: #2a9a4a; box-shadow: none; } }
    @keyframes arrow-flash-out { 0% { border-left-color: #7fb; } 100% { border-left-color: #2a9a4a; } }

    /* relay 엣지 (간접 수신, src→GS) 회색 점선 */
    .edge.relay .edge-line        { background: repeating-linear-gradient(90deg, #555 0, #555 5px, transparent 5px, transparent 10px); }
    .edge.relay .edge-line::after { border-left-color: #666; }
    .edge.relay.active .edge-line        { background: repeating-linear-gradient(90deg, #888 0, #888 5px, transparent 5px, transparent 10px); }
    .edge.relay.active .edge-line::after { border-left-color: #999; }
    .edge.relay .dot { background: #aaa; box-shadow: 0 0 6px #aaa, 0 0 12px #777; }
    .edge.relay.flash { animation: relay-flash 0.5s ease-out; }
    @keyframes relay-flash { 0% { filter: brightness(4); } 100% { filter: brightness(1); } }

    /* 이동 점 */
    .dot { position: absolute; width: 8px; height: 8px; background: #7df; border-radius: 50%; top: 50%; margin-top: -4px; left: 0%; opacity: 0; box-shadow: 0 0 6px #7df, 0 0 12px #4af; z-index: 20; }
    .dot.travel { animation: dot-travel 0.65s ease-in-out forwards; }
    @keyframes dot-travel { 0% { left: 0%; opacity: 1; } 85% { left: 100%; opacity: 1; } 100% { left: 100%; opacity: 0; } }

    .edge-count { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #445; pointer-events: none; }

    @keyframes gs-pulse  { 0% { box-shadow: 0 0 0 0 rgba(100,220,255,0.9); } 100% { box-shadow: 0 0 20px 12px rgba(100,220,255,0); } }
    @keyframes row-flash { 0% { background: #1a3555; } 100% { background: #1a1a1a; } }
  </style>
</head>

<body>
  <div id="graph-panel">
    <div id="graph-header">
      <h2>Mesh Network Graph</h2>
      <div id="range-controls">
        <label><input type="checkbox" id="show-grid" checked> grid</label>
        <span style="color:#2a2a2a">│</span>
        <label><input type="checkbox" id="show-range" checked> comm range</label>
        <span style="color:#2a2a2a">│</span>
        <label><input type="checkbox" id="show-tasks" checked> tasks</label>
        <input type="range" id="range-slider" min="0.1" max="5" step="0.1" value="1.0">
        <input type="number" id="range-input" min="0.1" max="99" step="0.1" value="1.0">
        <span>m</span>
      </div>
    </div>
    <div id="graph">
      <canvas id="grid-canvas"></canvas>
      <div id="coord-panel"></div>
    </div>
  </div>
  <div id="log-panel">
    <div id="log-header">
      <h2>Recent Packets</h2>
      <label><input type="checkbox" id="show-gs-tx" checked> GS TX 표시</label>
    </div>
    <div id="log-list"></div>
    <div id="status">대기 중...</div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const TASKS = [
      { id: 0, x:  -0.90, y: -0.85 },
      { id: 1, x:  -0.30, y:  1.05 },
      { id: 2, x:   0.95, y:  0.80 },
      { id: 3, x:   1.10, y: -0.35 },
      { id: 4, x:  -1.15, y:  0.25 },
      { id: 5, x:   0.20, y: -1.10 },
      { id: 6, x:   0.70, y:  0.05 },
    ];

    const graphEl    = document.getElementById('graph');
    const nodeEls    = {};  // id -> div
    const rangeEls   = {};  // id -> div (range circle)
    const edgeEls      = {};  // "id" -> {wrap,line,dot,count}  직접 수신
    const edgeOutEls   = {};  // "id" -> {wrap,line,dot}         GS 송신
    const edgeRelayEls = {};  // "id" -> {wrap,line,dot}         간접 수신 (src→GS 회색 점선)
    const nodePos    = {};  // id -> {x,y} px
    const nodeData   = {};  // id -> {x_m,y_m,z_m}
    let gsId     = null;
    let rangeR   = 1.0;  // meters
    let showGsTx = true;

    const SCALE = 300;

    function w2s(xm, ym) {
      const W = graphEl.offsetWidth || 600, H = graphEl.offsetHeight || 500;
      return { x: W / 2 + xm * SCALE, y: H / 2 - ym * SCALE };
    }

    function makeNode(id) {
      const d = document.createElement('div');
      d.className = 'node';
      d.innerHTML = '<span class="id">0x' + id.toString(16).padStart(2, '0') + '</span>'
                  + '<span class="seq">seq:0</span><span class="pos">-</span>';
      graphEl.appendChild(d);
      return d;
    }

    function makeRangeCircle(id) {
      const d = document.createElement('div');
      d.className = 'range-circle';
      graphEl.insertBefore(d, graphEl.firstChild); // 엣지/노드 아래로
      return d;
    }

    function makeRelayEdge() {
      const wrap = document.createElement('div');
      wrap.className = 'edge relay';
      const line = document.createElement('div'); line.className = 'edge-line';
      const dot  = document.createElement('div'); dot.className  = 'dot';
      wrap.appendChild(line); wrap.appendChild(dot);
      graphEl.appendChild(wrap);
      return { wrap, line, dot };
    }

    function makeEdge(isOut) {
      const wrap = document.createElement('div');
      wrap.className = isOut ? 'edge out' : 'edge';
      const line = document.createElement('div'); line.className = 'edge-line';
      const dot  = document.createElement('div'); dot.className  = 'dot';
      wrap.appendChild(line); wrap.appendChild(dot);
      if (!isOut) {
        const c = document.createElement('span'); c.className = 'edge-count'; wrap.appendChild(c);
      }
      graphEl.appendChild(wrap);
      return isOut ? { wrap, line, dot } : { wrap, line, dot, count: wrap.querySelector('.edge-count') };
    }

    function placeNode(id, xm, ym) {
      const p = w2s(xm, ym);
      nodePos[id] = p;
      if (nodeEls[id]) { nodeEls[id].style.left = p.x + 'px'; nodeEls[id].style.top = p.y + 'px'; }
      placeRangeCircle(id);
      for (const k in edgeRelayEls) {
        if (+k === id || id === gsId) refreshEdgeRelay(k);
      }
    }

    function placeRangeCircle(id) {
      const p = nodePos[id];
      if (!p) return;
      if (!rangeEls[id]) { rangeEls[id] = makeRangeCircle(id); if (!document.getElementById('show-range').checked) rangeEls[id].style.display = 'none'; }
      const d = rangeR * SCALE * 2;
      const el = rangeEls[id];
      el.style.left   = p.x + 'px';
      el.style.top    = p.y + 'px';
      el.style.width  = d + 'px';
      el.style.height = d + 'px';
    }

    function updateAllRangeCircles() {
      for (const id in nodePos) placeRangeCircle(+id);
    }

    function positionEdge(obj, from, to) {
      const R = 30, dx = to.x - from.x, dy = to.y - from.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) return;
      const ux = dx / dist, uy = dy / dist;
      obj.wrap.style.left      = (from.x + ux * R) + 'px';
      obj.wrap.style.top       = (from.y + uy * R) + 'px';
      obj.wrap.style.width     = Math.max(0, dist - R * 2 - 4) + 'px';
      obj.wrap.style.transform = 'rotate(' + (Math.atan2(dy, dx) * 180 / Math.PI) + 'deg)';
    }

    function refreshEdge(key) {
      const obj = edgeEls[key], from = nodePos[+key], to = gsId != null ? nodePos[gsId] : null;
      if (obj && from && to) positionEdge(obj, from, to);
    }

    function refreshEdgeRelay(key) {
      const obj  = edgeRelayEls[key];
      const from = nodePos[+key];
      const to   = gsId != null ? nodePos[gsId] : null;
      if (obj && from && to) positionEdge(obj, from, to);
    }

    function refreshEdgeOut(key) {
      const obj = edgeOutEls[key], from = gsId != null ? nodePos[gsId] : null, to = nodePos[+key];
      if (obj && from && to) positionEdge(obj, from, to);
    }

    function flashEl(el, cls) {
      el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls);
      el.addEventListener('animationend', function() { el.classList.remove(cls); }, { once: true });
    }

    function fireAnim(srcId) {
      const obj = edgeEls[String(srcId)]; if (!obj) return;
      flashEl(obj.wrap, 'flash');
      obj.dot.classList.remove('travel'); void obj.dot.offsetWidth; obj.dot.classList.add('travel');
      obj.dot.addEventListener('animationend', function() {
        obj.dot.classList.remove('travel');
        if (gsId != null && nodeEls[gsId]) flashEl(nodeEls[gsId], 'gs-flash');
      }, { once: true });
    }

    function fireRelayAnim(key) {
      const obj = edgeRelayEls[key]; if (!obj) return;
      obj.dot.classList.remove('travel'); void obj.dot.offsetWidth; obj.dot.classList.add('travel');
      obj.dot.addEventListener('animationend', function() { obj.dot.classList.remove('travel'); }, { once: true });
    }

    function fireAnimOut() {
      for (const key in edgeOutEls) {
        const obj = edgeOutEls[key];
        flashEl(obj.wrap, 'flash');
        obj.dot.classList.remove('travel'); void obj.dot.offsetWidth; obj.dot.classList.add('travel');
        obj.dot.addEventListener('animationend', function() { obj.dot.classList.remove('travel'); }, { once: true });
      }
    }

    function applyNode(node) {
      if (!nodeEls[node.id]) nodeEls[node.id] = makeNode(node.id);
      nodeData[node.id] = { x_m: node.x_m, y_m: node.y_m, z_m: node.z_m };
      placeNode(node.id, node.x_m, node.y_m);
      const el = nodeEls[node.id];
      el.classList.toggle('active', !!node.active);
      if (gsId != null && node.id === gsId) {
        el.classList.add('gs');
        if (rangeEls[node.id]) rangeEls[node.id].classList.add('gs');
      }
      el.querySelector('.seq').textContent = 'seq:' + node.seq;
      el.querySelector('.pos').textContent = '(' + node.x_m + ',' + node.y_m + ',' + node.z_m + ')';
      updateCoordPanel();
    }

    function updateGraph(data) {
      if (data.gs_id != null) gsId = data.gs_id;
      for (const node of data.nodes) applyNode(node);
      for (const edge of data.edges) {
        if (edge.src === edge.tx) {
          const key = String(edge.src);
          if (!edgeEls[key]) edgeEls[key] = makeEdge(false);
          refreshEdge(key);
          edgeEls[key].wrap.classList.toggle('active', !!edge.active);
          edgeEls[key].count.textContent = edge.count;
        } else {
          const key = String(edge.src);
          if (!edgeRelayEls[key]) edgeRelayEls[key] = makeRelayEdge();
          refreshEdgeRelay(key);
          edgeRelayEls[key].wrap.classList.toggle('active', !!edge.active);
        }
      }
      if (gsId != null) {
        for (const node of data.nodes) {
          if (node.id === gsId) continue;
          const key = String(node.id);
          if (!edgeOutEls[key]) { edgeOutEls[key] = makeEdge(true); if (!showGsTx) edgeOutEls[key].wrap.style.display = 'none'; }
          refreshEdgeOut(key);
          edgeOutEls[key].wrap.classList.toggle('active', !!node.active);
        }
      }
    }

    // ── 로그 ─────────────────────────────────────────────────────────────────────
    const logList  = document.getElementById('log-list');
    const logItems = [];

    function prependLog(p, isNew, isTx) {
      const div = document.createElement('div');
      div.className = 'log-item' + (isNew ? ' new' : '');
      div.style.borderLeftColor = isTx ? '#2a9a4a' : (p.tx != null && p.src !== p.tx ? '#f90' : '#333');
      const pos = p.x_m != null ? ' <span style="color:#7a9">(' + p.x_m + ',' + p.y_m + ',' + (p.z_m != null ? p.z_m : '-') + ')</span>' : '';
      const dir = isTx ? '<span style="color:#2a9a4a">TX</span> ' : '';
      const relay = !isTx && p.tx != null && p.src !== p.tx
        ? ' tx:<span style="color:#fa4">0x' + p.tx.toString(16).padStart(2, '0') + '</span>' : '';
      div.innerHTML = '<span style="color:#555">' + p.time + '</span> ' + dir
        + 'src:<span style="color:#4af;font-weight:bold">0x' + p.src.toString(16).padStart(2, '0') + '</span>'
        + relay + ' seq:' + p.seq
        + (p.hop != null ? ' hop:' + p.hop : '') + (p.t_ms != null ? ' t:' + p.t_ms + 'ms' : '') + pos;
      logList.prepend(div);
      logItems.unshift(div);
      if (logItems.length > 30) logList.removeChild(logItems.pop());
    }

    function setStatus(t) { document.getElementById('status').textContent = t; }

    // ── Grid ─────────────────────────────────────────────────────────────────────
    const gridCanvas = document.getElementById('grid-canvas');
    const gridCtx    = gridCanvas.getContext('2d');
    let showGrid = true;

    function drawGrid() {
      const W = graphEl.offsetWidth || 600;
      const H = graphEl.offsetHeight || 500;
      gridCanvas.width  = W;
      gridCanvas.height = H;
      gridCtx.clearRect(0, 0, W, H);
      if (!showGrid) return;

      const STEP = 0.5;
      const xMin = Math.floor(-W / (2 * SCALE) / STEP) - 1;
      const xMax = Math.ceil ( W / (2 * SCALE) / STEP) + 1;
      const yMin = Math.floor(-H / (2 * SCALE) / STEP) - 1;
      const yMax = Math.ceil ( H / (2 * SCALE) / STEP) + 1;

      gridCtx.font      = '9px monospace';
      gridCtx.textAlign = 'left';

      for (let xi = xMin; xi <= xMax; xi++) {
        const xw = xi * STEP;
        const sx = W / 2 + xw * SCALE;
        const isAxis = xi === 0;
        gridCtx.strokeStyle = isAxis ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.05)';
        gridCtx.lineWidth   = isAxis ? 1 : 0.5;
        gridCtx.beginPath(); gridCtx.moveTo(sx, 0); gridCtx.lineTo(sx, H); gridCtx.stroke();
        if (!isAxis) {
          gridCtx.fillStyle = 'rgba(130,130,130,0.35)';
          gridCtx.fillText((xw).toFixed(1), sx + 2, H - 4);
        }
      }

      for (let yi = yMin; yi <= yMax; yi++) {
        const yw = yi * STEP;
        const sy = H / 2 - yw * SCALE;
        const isAxis = yi === 0;
        gridCtx.strokeStyle = isAxis ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.05)';
        gridCtx.lineWidth   = isAxis ? 1 : 0.5;
        gridCtx.beginPath(); gridCtx.moveTo(0, sy); gridCtx.lineTo(W, sy); gridCtx.stroke();
        if (!isAxis) {
          gridCtx.fillStyle = 'rgba(130,130,130,0.35)';
          gridCtx.fillText((yw).toFixed(1), 4, sy - 2);
        }
      }

      /* 원점 마커 */
      const ox = W / 2, oy = H / 2;
      gridCtx.fillStyle = 'rgba(200,200,200,0.35)';
      gridCtx.beginPath(); gridCtx.arc(ox, oy, 2.5, 0, Math.PI * 2); gridCtx.fill();
    }

    document.getElementById('show-grid').addEventListener('change', function() {
      showGrid = this.checked;
      drawGrid();
    });

    document.getElementById('show-range').addEventListener('change', function() {
      const vis = this.checked ? '' : 'none';
      for (const id in rangeEls) rangeEls[id].style.display = vis;
    });

    // ── 좌표 패널 ─────────────────────────────────────────────────────────────────
    const coordPanel = document.getElementById('coord-panel');

    function updateCoordPanel() {
      function fmt(v) { return (v >= 0 ? '+' : '') + (+v).toFixed(2); }
      const entries = Object.keys(nodeData).map(function(k) { return { id: +k, d: nodeData[k] }; });
      entries.sort(function(a, b) { return a.id - b.id; });
      coordPanel.innerHTML = entries.map(function(e) {
        const hex = '0x' + e.id.toString(16).padStart(2, '0');
        const c   = e.id === gsId ? '#4fb' : '#4af';
        return '<div><span style="color:' + c + '">' + hex + '</span>'
          + ' <span style="color:#8af">x</span><span style="color:#aaa">:' + fmt(e.d.x_m) + '</span>'
          + ' <span style="color:#8af">y</span><span style="color:#aaa">:' + fmt(e.d.y_m) + '</span>'
          + ' <span style="color:#6a8">z</span><span style="color:#aaa">:' + (e.d.z_m != null ? fmt(e.d.z_m) : ' - ') + '</span></div>';
      }).join('');
    }

    // ── Range 컨트롤 ──────────────────────────────────────────────────────────────
    const slider     = document.getElementById('range-slider');
    const rangeInput = document.getElementById('range-input');

    function setRange(val) {
      val = Math.max(0.1, parseFloat(val) || 1.0);
      rangeR = val;
      slider.value     = Math.min(val, 5);
      rangeInput.value = val.toFixed(1);
      updateAllRangeCircles();
    }

    slider.addEventListener('input', function() { setRange(slider.value); });
    rangeInput.addEventListener('change', function() { setRange(rangeInput.value); });
    rangeInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') setRange(rangeInput.value); });

    document.getElementById('show-gs-tx').addEventListener('change', function() {
      showGsTx = this.checked;
      for (const k in edgeOutEls) {
        edgeOutEls[k].wrap.style.display = showGsTx ? '' : 'none';
      }
    });

    // ── WebSocket ─────────────────────────────────────────────────────────────────
    const socket = io();

    socket.on('init', function(data) {
      updateGraph(data);
      data.log.slice().reverse().forEach(function(p) { prependLog(p, false, false); });
      setStatus('노드 ' + data.nodes.length + '개 · WebSocket 연결됨');
    });

    socket.on('packet', function(p) {
      if (!nodeEls[p.src]) { socket.emit('request_init'); return; }
      nodeData[p.src] = { x_m: p.x_m, y_m: p.y_m, z_m: p.z_m };
      placeNode(p.src, p.x_m, p.y_m);
      const el = nodeEls[p.src];
      el.classList.add('active');
      el.querySelector('.seq').textContent = 'seq:' + p.seq;
      el.querySelector('.pos').textContent = '(' + p.x_m + ',' + p.y_m + ',' + (p.z_m != null ? p.z_m : '-') + ')';
      if (p.hop === 0) {
        refreshEdge(String(p.src));
        const obj = edgeEls[String(p.src)];
        if (obj) {
          obj.wrap.classList.add('active');
          obj.count.textContent = (parseInt(obj.count.textContent) || 0) + 1;
        }
        fireAnim(p.src);
      } else if (gsId != null && nodePos[gsId]) {
        const key = String(p.src);
        if (!edgeRelayEls[key]) edgeRelayEls[key] = makeRelayEdge();
        refreshEdgeRelay(key);
        edgeRelayEls[key].wrap.classList.add('active');
        fireRelayAnim(key);
      }
      prependLog(p, true, false);
    });

    socket.on('gs_tx', function(p) {
      const wasNull = gsId == null;
      gsId = p.src;
      if (!nodeEls[p.src]) nodeEls[p.src] = makeNode(p.src);
      nodeEls[p.src].classList.add('gs', 'active');
      if (rangeEls[p.src]) rangeEls[p.src].classList.add('gs');
      nodeData[p.src] = { x_m: p.x_m, y_m: p.y_m, z_m: p.z_m };
      placeNode(p.src, p.x_m, p.y_m);
      nodeEls[p.src].querySelector('.seq').textContent = 'seq:' + p.seq;
      nodeEls[p.src].querySelector('.pos').textContent = '(' + p.x_m + ',' + p.y_m + ',' + p.z_m + ')';
      updateCoordPanel();
      if (wasNull) {
        for (const k in edgeEls)      refreshEdge(k);
        for (const k in edgeRelayEls) refreshEdgeRelay(k);
      }
      for (const id in nodeEls) {
        const numId = parseInt(id);
        if (isNaN(numId) || numId === p.src) continue;
        const key = String(numId);
        if (!edgeOutEls[key]) { edgeOutEls[key] = makeEdge(true); if (!showGsTx) edgeOutEls[key].wrap.style.display = 'none'; }
        refreshEdgeOut(key);
        edgeOutEls[key].wrap.classList.add('active');
      }
      flashEl(nodeEls[p.src], 'gs-flash');
      if (showGsTx) fireAnimOut();
      if (showGsTx) prependLog(p, true, true);
    });

    socket.on('connect',    function() { setStatus('서버 연결됨'); });
    socket.on('disconnect', function() { setStatus('서버 연결 끊김'); });

    // ── Task 마커 ─────────────────────────────────────────────────────────────────
    const taskEls = [];  // [{marker, label}]

    function placeTaskMarkers() {
      for (const t of TASKS) {
        const p = w2s(t.x, t.y);
        if (taskEls[t.id]) {
          taskEls[t.id].marker.style.left = p.x + 'px';
          taskEls[t.id].marker.style.top  = p.y + 'px';
          taskEls[t.id].label.style.left  = p.x + 'px';
          taskEls[t.id].label.style.top   = (p.y - 16) + 'px';
        } else {
          const marker = document.createElement('div');
          marker.className = 'task-marker';
          marker.style.left = p.x + 'px';
          marker.style.top  = p.y + 'px';
          const label = document.createElement('div');
          label.className = 'task-label';
          label.textContent = 'T' + t.id;
          label.style.left = p.x + 'px';
          label.style.top  = (p.y - 16) + 'px';
          graphEl.appendChild(marker);
          graphEl.appendChild(label);
          taskEls[t.id] = { marker, label };
        }
      }
    }

    placeTaskMarkers();

    document.getElementById('show-tasks').addEventListener('change', function() {
      const vis = this.checked ? '' : 'none';
      for (const t of taskEls) { if (t) { t.marker.style.display = vis; t.label.style.display = vis; } }
    });

    window.addEventListener('resize', function() {
      drawGrid();
      for (const id in nodeData) placeNode(+id, nodeData[id].x_m, nodeData[id].y_m);
      for (const k in edgeEls)      refreshEdge(k);
      for (const k in edgeOutEls)   refreshEdgeOut(k);
      for (const k in edgeRelayEls) refreshEdgeRelay(k);
      placeTaskMarkers();
    });
  </script>
</body>
</html>
